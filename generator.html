<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Generator pytań</title>

<style>
body {
    font-family: Arial;
    background: #1e293b;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
}

.question {
    background: #334155;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
}

textarea, input {
    width: 100%;
    margin: 5px 0;
    padding: 8px;
}

.answer {
    display: flex;
    gap: 10px;
    align-items: center;
}

button {
    margin: 10px;
    padding: 10px 20px;
    cursor: pointer;
}

#output {
    background: #0f172a;
    padding: 15px;
    margin-top: 20px;
    text-align: left;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<h1>Generator wielu pytań</h1>

<div id="questions"></div>

<button onclick="addQuestion()">➕ Dodaj pytanie</button>
<button onclick="generate()">⚙️ Generuj cały kod</button>

<div id="output"></div>

</div>

<script>

function addQuestion(){
    let div = document.createElement("div");
    div.className = "question";

    div.innerHTML = `
        <textarea placeholder="Pytanie"></textarea>
        <div class="answers"></div>
        <button onclick="addAnswer(this)">➕ Odpowiedź</button>
    `;

    document.getElementById("questions").appendChild(div);
}

function addAnswer(btn){
    let container = btn.parentElement.querySelector(".answers");

    let div = document.createElement("div");
    div.className = "answer";

    div.innerHTML = `
        <input type="checkbox">
        <input type="text" placeholder="Odpowiedź">
    `;

    container.appendChild(div);
}

function generate(){
    let result = "";

    document.querySelectorAll(".question").forEach(q => {

        let pytanie = q.querySelector("textarea").value;

        let odp = [];
        let poprawne = [];

        q.querySelectorAll(".answer").forEach((a, i)=>{
            let text = a.children[1].value;
            let checked = a.children[0].checked;

            odp.push(`"${text}"`);
            if(checked) poprawne.push(i);
        });

        result += `{
pytanie: "${pytanie}",
odpowiedzi: [
${odp.join(",\n")}
],
poprawne: [${poprawne.join(",")}]
},\n\n`;
    });

    document.getElementById("output").innerText = result;
}

</script>

</body>
</html>
