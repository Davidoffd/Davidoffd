let aktualne=0, dobre=0, zle=0;

function start(){
menu.style.display="none";
testBox.style.display="block";
pokaz();
}

function pokaz(){
let p=test[aktualne];
licznik.innerText="Pytanie "+(aktualne+1)+" / "+test.length;
pytanie.innerText=p.pytanie;

let html="";
p.odpowiedzi.forEach((o,i)=>{
html+=`<label id="l${i}"><input type="checkbox" value="${i}"> ${o}</label>`;
});
odpowiedzi.innerHTML=html;

btnDalej.style.display="none";
info.innerText="";
}

function sprawdz(){
let zaz=[...document.querySelectorAll("input:checked")].map(e=>+e.value);
let pop=test[aktualne].poprawne;

document.querySelectorAll("label").forEach((el,i)=>{
if(pop.includes(i)) el.classList.add("correct");
else if(zaz.includes(i)) el.classList.add("wrong");
});

if(zaz.length===pop.length && zaz.every(v=>pop.includes(v))){
dobre++; info.innerText="✅";
}else{
zle++; info.innerText="❌";
}

btnDalej.style.display="inline";
}

function dalej(){
aktualne++;
if(aktualne<test.length) pokaz();
else koniecTestu();
}

function koniecTestu(){
testBox.style.display="none";
koniec.style.display="block";

let suma=dobre+zle;
let procent=Math.round((dobre/suma)*100);
wynik.innerHTML=`Wynik: ${procent}%<br>Dobre: ${dobre}<br>Złe: ${zle}`;
}

function menuBack(){
location.reload();
}
