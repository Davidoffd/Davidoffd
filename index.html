<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Test 6B</title>

<style>
body {
    font-family: Arial;
    background: #1e293b;
    color: white;
    text-align: center;
    padding: 20px;
}
.box {
    max-width: 900px;
    margin: auto;
}
label {
    display: block;
    margin: 6px;
    text-align: left;
}
.correct {
    color: lightgreen;
}
.wrong {
    color: red;
}
button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box">

<h1>Test 6B</h1>
<p id="licznik"></p>

<h2 id="pytanie"></h2>
<div id="odpowiedzi"></div>

<button onclick="sprawdz()">Sprawdź</button>
<button id="btnDalej" onclick="dalej()" style="display:none;">Dalej</button>
<button id="btnRestart" onclick="restart()" style="display:none;">Restart</button>

<p id="info"></p>

</div>

<script>

let test = [

{
pytanie: "Do metod kontroli bezpieczeństwa materiałów i poczty przewoźnika lotniczego, które będą załadowane do jakiejkolwiek części pasażerskiego statku powietrznego innej niż luk bagażowy, zaliczamy:",
odpowiedzi: [
"kontrolę manualną;",
"systemy wykrywania materiałów wybuchowych;",
"urządzenie do wykrywania śladowych ilości materiałów wybuchowych w połączeniu z ręcznym wykrywaczem metali;",
"kontrolę wzrokową;",
"urządzenie do wykrywania śladowych ilości materiałów wybuchowych."
],
poprawne: [0,1,4]
},

{
pytanie: "Do metod kontroli bezpieczeństwa bagażu rejestrowanego zaliczamy:",
odpowiedzi: [
"kontrolę manualną;",
"urządzenie do wykrywania śladowych ilości materiałów wybuchowych w połączeniu z ręcznym wykrywaczem metali;",
"systemy wykrywania materiałów wybuchowych;",
"urządzenie rentgenowskie;",
"urządzenie do wykrywania śladowych ilości materiałów wybuchowych."
],
poprawne: [0,2,3,4]
}

];

let aktualne = 0;
let dobre = 0;
let zle = 0;

function pokaz() {
    let p = test[aktualne];

    licznik.innerText = "Pytanie " + (aktualne+1) + " / " + test.length;
    pytanie.innerText = p.pytanie;

    let html = "";
    p.odpowiedzi.forEach((odp,i)=>{
        html += `<label id="odp${i}"><input type="checkbox" value="${i}"> ${odp}</label>`;
    });

    odpowiedzi.innerHTML = html;
    info.innerText = "";
    btnDalej.style.display = "none";
}

function sprawdz(){
    let zaz = [...document.querySelectorAll("input:checked")].map(e=>Number(e.value));
    let pop = test[aktualne].poprawne;

    document.querySelectorAll("label").forEach((el,i)=>{
        if(pop.includes(i)){
            el.classList.add("correct");
        } else if(zaz.includes(i)){
            el.classList.add("wrong");
        }
    });

    let ok = zaz.length===pop.length && zaz.every(v=>pop.includes(v));

    if(ok){
        dobre++;
        info.innerText="✅ Dobrze";
    }else{
        zle++;
        info.innerText="❌ Źle";
    }

    btnDalej.style.display="inline";
}

function dalej(){
    aktualne++;
    if(aktualne<test.length){
        pokaz();
    }else{
        koniec();
    }
}

function koniec(){
    let suma=dobre+zle;
    let procent=Math.round((dobre/suma)*100);

    pytanie.innerText="Koniec testu";
    odpowiedzi.innerHTML="";
    info.innerHTML=`Dobre: ${dobre}<br>Złe: ${zle}<br>Wynik: ${procent}%`;

    btnDalej.style.display="none";
    btnRestart.style.display="inline";
}

function restart(){
    location.reload();
}

pokaz();

</script>

</body>
</html>
