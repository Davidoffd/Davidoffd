<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Test 6B</title>

<style>
body {
    font-family: Arial;
    background: #1e293b;
    color: white;
    text-align: center;
    padding: 30px;
}

button {
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
}

#quiz {
    max-width: 800px;
    margin: auto;
    text-align: left;
}

label {
    display: block;
    margin: 5px 0;
}
</style>
</head>

<body>

<h1>Test 6B</h1>

<div id="quiz">
    <h2 id="pytanie"></h2>
    <div id="odpowiedzi"></div>

    <button onclick="sprawdz()">Sprawdź</button>
    <button onclick="dalej()">Dalej</button>

    <div id="info"></div>
</div>

<script>
let aktualne = 0;
let dobre = 0;
let zle = 0;

let test = [
{
pytanie: "Do metod kontroli bezpieczeństwa materiałów i poczty przewoźnika lotniczego zaliczamy:",
odpowiedzi: [
"kontrolę manualną;",
"systemy wykrywania materiałów wybuchowych;",
"kontrolę wzrokową;"
],
poprawne: [0,1]
},
{
pytanie: "Do płynów, aerozoli i żeli zaliczamy:",
odpowiedzi: [
"syrop na kaszel;",
"czekoladę;",
"pastę do zębów;"
],
poprawne: [0,2]
}
];

function pokazPytanie() {
    let p = test[aktualne];

    document.getElementById("pytanie").innerText = p.pytanie;

    let html = "";
    p.odpowiedzi.forEach((odp, i) => {
        html += `<label>
        <input type="checkbox" value="${i}"> ${odp}
        </label>`;
    });

    document.getElementById("odpowiedzi").innerHTML = html;
    document.getElementById("info").innerHTML = "";
}

function sprawdz() {
    let zaznaczone = [...document.querySelectorAll("input:checked")].map(e => parseInt(e.value));
    let poprawne = test[aktualne].poprawne;

    let ok = zaznaczone.length === poprawne.length &&
             zaznaczone.every(v => poprawne.includes(v));

    if (ok) dobre++;
    else zle++;

    document.getElementById("info").innerHTML = ok ? "✅ Dobrze" : "❌ Źle";
}

function dalej() {
    aktualne++;

    if (aktualne >= test.length) {
        let suma = dobre + zle;
        let procent = Math.round((dobre / suma) * 100);

        document.getElementById("pytanie").innerText = "Koniec testu";
        document.getElementById("odpowiedzi").innerHTML = "";
        document.getElementById("info").innerHTML =
            `Dobre: ${dobre}<br>Złe: ${zle}<br>Wynik: ${procent}%`;
        return;
    }

    pokazPytanie();
}

pokazPytanie();
</script>

</body>
</html>
