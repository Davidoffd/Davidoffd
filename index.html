function pokaz() {
  let p = test[aktualne];

  document.getElementById("pytanie").innerText =
    "Pytanie " + (aktualne + 1) + " / " + test.length + ": " + p.pytanie;

  let html = "";

  p.odpowiedzi.forEach((odp, i) => {
    html += `<label><input type="checkbox" value="${i}"> ${odp}</label>`;
  });

  document.getElementById("odpowiedzi").innerHTML = html;
  document.getElementById("info").innerText = "";
}

function sprawdz() {
  let zaznaczone = [];

  document.querySelectorAll("input[type=checkbox]").forEach((el, i) => {
    if (el.checked) zaznaczone.push(i);
  });

  let poprawne = test[aktualne].poprawne;

  let dobrzeOdp =
    zaznaczone.length === poprawne.length &&
    zaznaczone.every(v => poprawne.includes(v));

  if (dobrzeOdp) {
    dobre++;
    document.getElementById("info").innerText = "✅ Dobrze";
  } else {
    zle++;
    document.getElementById("info").innerText = "❌ Źle";

    document.querySelectorAll("label").forEach((el, i) => {
      if (poprawne.includes(i)) {
        el.style.color = "lightgreen";
      } else {
        el.style.color = "red";
      }
    });
  }
}

function dalej() {
  aktualne++;

  if (aktualne >= test.length) {
    koniec();
    return;
  }

  pokaz();
}

function koniec() {
  let suma = dobre + zle;
  let procent = suma > 0 ? Math.round((dobre / suma) * 100) : 0;

  document.getElementById("pytanie").innerText = "Koniec testu";
  document.getElementById("odpowiedzi").innerHTML = "";

  document.getElementById("info").innerHTML =
    `Dobre: ${dobre}<br>Złe: ${zle}<br>Wynik: ${procent}%`;

  document.getElementById("btnDalej").style.display = "none";
  document.getElementById("btnRestart").style.display = "inline-block";
  document.getElementById("btnMenu").style.display = "inline-block";
}

function restart() {
  aktualne = 0;
  dobre = 0;
  zle = 0;

  document.getElementById("btnRestart").style.display = "none";
  document.getElementById("btnMenu").style.display = "none";
  document.getElementById("btnDalej").style.display = "inline-block";

  pokaz();
}

function menu() {
  location.reload();
}

pokaz();

</script>

</body>
</html>
