<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Menu</title>

<style>
body {
    font-family: Arial;
    background: #1e293b;
    color: white;
    text-align: center;
    margin: 0;
}

/* kontener */
.container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 90vh;
}

/* kafelki */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 220px);
    gap: 20px;
    margin-top: 30px;
}

.tile {
    background: #334155;
    padding: 40px 20px;
    border-radius: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.tile:hover {
    background: #475569;
    transform: scale(1.05);
}

/* stopka */
.footer {
    position: fixed;
    bottom: 10px;
    width: 100%;
    font-size: 10px;
}

.footer a {
    color: lightblue;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

    <h1>Wybierz kategorię</h1>

    <div class="grid">
      <div class="tile" onclick="showMenu('testy')">Testy cząstkowe</div>
<div class="tile" onclick="showMenu('egzamin')">Egzamin końcowy</div>
<div class="tile" onclick="location.href='test.html#ulc'">Pytania ULC</div>
    </div>

</div>

<div class="footer">
    <a href="https://zrzutka.pl/" target="_blank">
        Wspieraj projekt – zrzutka
    </a>
</div>

</body>
</html>
