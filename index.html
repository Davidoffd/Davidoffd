<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Test 6B</title>

<style>
body {
    font-family: Arial;
    background: #1e293b;
    color: white;
    text-align: center;
    padding: 20px;
}
.box {
    max-width: 900px;
    margin: auto;
}
label {
    display: block;
    margin: 6px;
    text-align: left;
}
.correct { color: lightgreen; }
.wrong { color: red; }
button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="box" id="menu">
<h1>Testy</h1>
<button onclick="start()">Start Test 6B (1–10)</button>
</div>

<div class="box" id="testBox" style="display:none;">

<h1>Test 6B</h1>
<p id="licznik"></p>

<h2 id="pytanie"></h2>
<div id="odpowiedzi"></div>

<button onclick="sprawdz()">Sprawdź</button>
<button id="btnDalej" onclick="dalej()" style="display:none;">Dalej</button>

<p id="info"></p>

</div>

<div class="box" id="koniec" style="display:none;">
<h2>Koniec testu</h2>
<p id="wynik"></p>
<button onclick="menuBack()">Powrót do menu</button>
</div>

<script>

let test = [

{
pytanie: "Do metod kontroli bezpieczeństwa materiałów i poczty przewoźnika lotniczego, które będą załadowane do jakiejkolwiek części pasażerskiego statku powietrznego innej niż luk bagażowy, zaliczamy:",
odpowiedzi: [
"kontrolę manualną;",
"systemy wykrywania materiałów wybuchowych;",
"urządzenie do wykrywania śladowych ilości materiałów wybuchowych w połączeniu z ręcznym wykrywaczem metali;",
"kontrolę wzrokową;",
"urządzenie do wykrywania śladowych ilości materiałów wybuchowych."
],
poprawne: [0,1,4]
},

{
pytanie: "Do metod kontroli bezpieczeństwa bagażu rejestrowanego zaliczamy:",
odpowiedzi: [
"kontrolę manualną;",
"urządzenie do wykrywania śladowych ilości materiałów wybuchowych w połączeniu z ręcznym wykrywaczem metali;",
"systemy wykrywania materiałów wybuchowych;",
"urządzenie rentgenowskie;",
"urządzenie do wykrywania śladowych ilości materiałów wybuchowych."
],
poprawne: [0,2,3,4]
},

{
pytanie: "Status ochrony przesyłki „SHR” oznacza:",
odpowiedzi: [
"przewóz substancji promieniotwórczych o niskiej aktywności właściwej;",
"przewóz bezpieczny dla pasażerskiego, towarowego i pocztowego statku powietrznego zgodnie z wymaganiami wysokiego ryzyka;",
"przewóz przesyłek pocztowych o grubości do 6 mm i wadze nieprzekraczającej 250 g zwolnionych z kontroli bezpieczeństwa;",
"przewóz bezpieczny tylko dla towarowego i pocztowego statku powietrznego;",
"przewóz bezpieczny tylko dla pasażerskiego i pocztowego statku powietrznego zgodnie z wymaganiami wysokiego ryzyka."
],
poprawne: [1]
},

{
pytanie: "Przedmioty zabronione do przewozu w bagażu kabinowym, o ile nie jest on zabroniony w bagażu rejestrowanym, zgodnie z KPOLC mogą być:",
odpowiedzi: [
"wniesione na pokład samolotu po dokonaniu dodatkowej opłaty zgodnie z cennikiem przewoźnika lotniczego;",
"umieszczone w bagażu rejestrowanym podczas odprawy biletowo – bagażowej;",
"usunięte z bagażu kabinowego, a następnie umieszczone w specjalnie do tego celu przeznaczonym pojemniku i zniszczone na koszt przewoźnika lotniczego lub zarządzającego lotniskiem;",
"przekazane w operatorowi kontroli bezpieczeństwa do przechowania;",
"przechowane na lotnisku za opłatą, w przeznaczonym do tego celu pomieszczeniu, do czasu zgłoszenia się po ich odbiór pasażera."
],
poprawne: [1,2,4]
},

{
pytanie: "Do kategorii przedmiotów zabronionych do przewozu w bagażu rejestrowanym zaliczamy:",
odpowiedzi: [
"łomy;",
"amunicję;",
"urządzenia wystrzeliwujące pociski;",
"repliki broni palnej;",
"substancje zapalające."
],
poprawne: [0,1,4]
},

{
pytanie: "Status ochrony przesyłki „SPX” oznacza:",
odpowiedzi: [
"przewóz bezpieczny tylko dla pasażerskiego, towarowego i pocztowego statku powietrznego;",
"przewóz przesyłek zawierających pomoc humanitarną;",
"przewóz próbek biomedycznych przewożonych na specjalnych warunkach;",
"przewóz bezpieczny dla pasażerskiego, towarowego i pocztowego statku powietrznego zgodnie z wymaganiami wysokiego ryzyka;",
"przewóz pasażerów potencjalnie uciążliwych."
],
poprawne: [0]
},

{
pytanie: "Do kategorii przedmiotów zabronionych do przewozu w materiałach i poczcie przewoźnika lotniczego, które będą załadowane do jakiejkolwiek części pasażerskiego statku powietrznego innej niż luk bagażowy, zaliczamy:",
odpowiedzi: [
"przedmioty z ostrym zakończeniem i ostrą krawędzią;",
"urządzenia wystrzeliwujące pociski;",
"narzędzia robocze;",
"komputery;",
"wyposażenie służące do sztuk walki."
],
poprawne: [0,1,2,4]
},

{
pytanie: "Zwolnieniem z kontroli bezpieczeństwa może podlegać:",
odpowiedzi: [
"rządowa poczta w przypadku, gdy ochronę i zabezpieczenie zapewnia dane państwo członkowskie oraz została przeprowadzona ocena ryzyka przez właściwy organ;",
"przesyłki łączone składające się wyłącznie z przesyłek, gdy grubość każdej z nich jest mniejsza niż 6 mm, a całkowity ciężar jest mniejszy niż 250 g;",
"sprzęt militarny;",
"przesyłka o grubości mniejsza niż 6 cm;",
"poczta dyplomatyczna."
],
poprawne: [0,1,4]
},

{
pytanie: "Do płynów, aerozoli i żeli zaliczamy:",
odpowiedzi: [
"syrop na kaszel;",
"tabliczkę czekolady;",
"bitą śmietanę w sprayu;",
"pastę do zębów w tubce;",
"ketchup."
],
poprawne: [0,2,3,4]
}

];

let aktualne=0, dobre=0, zle=0;

function start(){
menu.style.display="none";
testBox.style.display="block";
pokaz();
}

function pokaz(){
let p=test[aktualne];
licznik.innerText="Pytanie "+(aktualne+1)+" / "+test.length;
pytanie.innerText=p.pytanie;

let html="";
p.odpowiedzi.forEach((o,i)=>{
html+=`<label id="l${i}"><input type="checkbox" value="${i}"> ${o}</label>`;
});
odpowiedzi.innerHTML=html;

btnDalej.style.display="none";
info.innerText="";
}

function sprawdz(){
let zaz=[...document.querySelectorAll("input:checked")].map(e=>+e.value);
let pop=test[aktualne].poprawne;

document.querySelectorAll("label").forEach((el,i)=>{
if(pop.includes(i)) el.classList.add("correct");
else if(zaz.includes(i)) el.classList.add("wrong");
});

if(zaz.length===pop.length && zaz.every(v=>pop.includes(v))){
dobre++; info.innerText="✅";
}else{
zle++; info.innerText="❌";
}

btnDalej.style.display="inline";
}

function dalej(){
aktualne++;
if(aktualne<test.length) pokaz();
else koniecTestu();
}

function koniecTestu(){
testBox.style.display="none";
koniec.style.display="block";

let suma=dobre+zle;
let procent=Math.round((dobre/suma)*100);
wynik.innerHTML=`Wynik: ${procent}%<br>Dobre: ${dobre}<br>Złe: ${zle}`;
}

function menuBack(){
location.reload();
}

</script>

</body>
</html>
