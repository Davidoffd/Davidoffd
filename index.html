<!DOCTYPE html>
<html>
<head>
    <title>Testy</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            text-align: center;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 700px;
            margin: 30px auto;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        .good {
            color: green;
        }

        .bad {
            color: red;
        }
    </style>
</head>
<body>

<div class="box" id="menu">
    <h1>Wybierz test</h1>
    <button onclick="startTest(0)">Test 0</button>
    <button onclick="startTest(1)">Test 1</button>
</div>

<div class="box" id="quiz" style="display:none;">
    <h2 id="tytul"></h2>
    <p id="pytanie"></p>
    <div id="odpowiedzi"></div>

    <button onclick="sprawdz()" id="btnSprawdz">Sprawdź</button>
<button onclick="dalej()" id="btnDalej" style="display:none;">Dalej</button>

<button onclick="restartTest()" id="btnRestart" style="display:none;">Jeszcze raz</button>
<button onclick="powrotMenu()" id="btnMenu" style="display:none;">Menu</button>

    <p id="info"></p>
</div>

<script>

// 🔥 TESTY
let testy = [
    [
        {
            pytanie: "Które są liczbami parzystymi?",
            odpowiedzi: ["2", "3", "4", "5"],
            poprawne: [0, 2]
        },
        {
            pytanie: "Które to kolory?",
            odpowiedzi: ["Pies", "Czerwony", "Niebieski"],
            poprawne: [1, 2]
        }
    ],
    [
        {
            pytanie: "Stolice państw:",
            odpowiedzi: ["Warszawa", "Berlin", "Kot"],
            poprawne: [0, 1]
        }
    ]
];

let aktualnyTest = 0;
let aktualne = 0;
let dobre = 0;
let zle = 0;

function startTest(nr) {
    aktualnyTest = nr;
    aktualne = 0;
    dobre = 0;
    zle = 0;

    document.getElementById("menu").style.display = "none";
    document.getElementById("quiz").style.display = "block";
    document.getElementById("tytul").innerText = "Test " + nr;

    pokazPytanie();
}

function pokazPytanie() {
    let p = testy[aktualnyTest][aktualne];

    document.getElementById("pytanie").innerText = p.pytanie;

    let html = "";
    p.odpowiedzi.forEach((odp, i) => {
        html += `<label id="odp${i}">
            <input type="checkbox" value="${i}"> ${odp}
        </label><br>`;
    });

    document.getElementById("odpowiedzi").innerHTML = html;
    document.getElementById("info").innerText = "";

    document.getElementById("btnSprawdz").style.display = "inline";
    document.getElementById("btnDalej").style.display = "none";
}

function sprawdz() {
    let p = testy[aktualnyTest][aktualne];
    let zaznaczone = document.querySelectorAll('input[type="checkbox"]:checked');

    let wybrane = [];
    zaznaczone.forEach(el => wybrane.push(parseInt(el.value)));

    let poprawne = p.poprawne;

    let dobrze = JSON.stringify(wybrane.sort()) === JSON.stringify(poprawne.sort());

    // kolorowanie
    p.odpowiedzi.forEach((_, i) => {
        let el = document.getElementById("odp" + i);

        if (poprawne.includes(i)) {
            el.classList.add("good");
        }

        if (wybrane.includes(i) && !poprawne.includes(i)) {
            el.classList.add("bad");
        }
    });

    if (dobrze) {
        dobre++;
        document.getElementById("info").innerText = "✅ Dobrze!";
    } else {
        zle++;
        document.getElementById("info").innerText = "❌ Źle!";
    }

    document.getElementById("btnSprawdz").style.display = "none";
    document.getElementById("btnDalej").style.display = "inline";
}

function dalej() {
    aktualne++;

    if (aktualne < testy[aktualnyTest].length) {
        pokazPytanie();
    } else {
        let suma = dobre + zle;
        let procent = Math.round((dobre / suma) * 100);

        document.getElementById("pytanie").innerText = "Koniec testu!";
        document.getElementById("odpowiedzi").innerHTML = "";
        document.getElementById("info").innerHTML =
            `Dobre: ${dobre}<br>Złe: ${zle}<br>Wynik: ${procent}%`;

        document.getElementById("btnDalej").style.display = "none";
    }
}

function restartTest() {
    startTest(aktualnyTest);
}

function powrotMenu() {
    document.getElementById("quiz").style.display = "none";
    document.getElementById("menu").style.display = "block";
}

</body>
</html>
