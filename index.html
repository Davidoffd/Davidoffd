<!DOCTYPE html>
<html>
<head>
    <title>Testy</title>
    <style>
        body {
            font-family: Arial;
            background: #f0f0f0;
            text-align: center;
        }

        .box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: 30px auto;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="box" id="menu">
    <h1>Wybierz test</h1>
    <button onclick="startTest(0)">Test 0</button>
    <button onclick="startTest(1)">Test 1</button>
    <button onclick="startTest(2)">Test 2</button>
</div>

<div class="box" id="quiz" style="display:none;">
    <h2 id="tytul"></h2>
    <p id="pytanie"></p>
    <div id="odpowiedzi"></div>
    <button onclick="sprawdz()">Dalej</button>
    <p id="wynik"></p>
</div>

<script>

// 🔥 BAZA TESTÓW
let testy = [
    [
        {
            pytanie: "2 + 2 = ?",
            odpowiedzi: ["3", "4", "5"],
            poprawna: 1
        },
        {
            pytanie: "3 + 3 = ?",
            odpowiedzi: ["5", "6", "7"],
            poprawna: 1
        }
    ],
    [
        {
            pytanie: "Stolica Polski?",
            odpowiedzi: ["Warszawa", "Berlin", "Paryż"],
            poprawna: 0
        }
    ],
    [
        {
            pytanie: "Kolor nieba?",
            odpowiedzi: ["Zielony", "Niebieski", "Czerwony"],
            poprawna: 1
        }
    ]
];

let aktualne = 0;
let aktualnyTest = 0;
let punkty = 0;

function startTest(nr) {
    aktualnyTest = nr;
    aktualne = 0;
    punkty = 0;

    document.getElementById("menu").style.display = "none";
    document.getElementById("quiz").style.display = "block";

    document.getElementById("tytul").innerText = "Test " + nr;

    pokazPytanie();
}

function pokazPytanie() {
    let p = testy[aktualnyTest][aktualne];

    document.getElementById("pytanie").innerText = p.pytanie;

    let html = "";
    p.odpowiedzi.forEach((odp, i) => {
        html += `<label><input type="radio" name="odp" value="${i}"> ${odp}</label><br>`;
    });

    document.getElementById("odpowiedzi").innerHTML = html;
}

function sprawdz() {
    let wybrana = document.querySelector('input[name="odp"]:checked');

    if (!wybrana) {
        alert("Wybierz odpowiedź!");
        return;
    }

    let p = testy[aktualnyTest][aktualne];

    if (parseInt(wybrana.value) === p.poprawna) {
        punkty++;
    }

    aktualne++;

    if (aktualne < testy[aktualnyTest].length) {
        pokazPytanie();
    } else {
        document.getElementById("pytanie").innerText = "Koniec testu!";
        document.getElementById("odpowiedzi").innerHTML = "";
        document.getElementById("wynik").innerText = "Wynik: " + punkty;
    }
}

</script>

</body>
</html>
