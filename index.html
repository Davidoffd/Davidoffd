<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Testy</title>
<style>
body { font-family: Arial; background:#f0f0f0; text-align:center; }
.box { background:white; padding:20px; border-radius:10px; max-width:800px; margin:30px auto; }
button { padding:10px; margin:5px; cursor:pointer; }
.good { color:green; }
.bad { color:red; }
</style>
</head>
<body>

<div class="box" id="menu">
<h1>Wybierz test</h1>
<button onclick="startTest(0)">Test 0B</button>
<button onclick="startTest(1)">Test 6B</button>
</div>

<div class="box" id="quiz" style="display:none;">
<h2 id="tytul"></h2>
<p id="licznik"></p>
<p id="pytanie"></p>
<div id="odpowiedzi"></div>

<button onclick="sprawdz()" id="btnSprawdz">Sprawdź</button>
<button onclick="dalej()" id="btnDalej" style="display:none;">Dalej</button>
<button onclick="restartTest()" id="btnRestart" style="display:none;">Jeszcze raz</button>
<button onclick="powrotMenu()" id="btnMenu" style="display:none;">Menu</button>

<p id="info"></p>
</div>

<script>

let testy = [

/* TEST 0B */
[
{
pytanie: "Test działa poprawnie?",
odpowiedzi: ["Tak","Nie"],
poprawne: [0]
}
],

/* TEST 6B (TU WSTAWIMY 40 PYTAŃ) */
[
{
pytanie: "TEST ŁADOWANIA — jeśli to widzisz, działa",
odpowiedzi: ["OK","NIE"],
poprawne: [0]
}
]

];

let aktualnyTest = 0;
let aktualne = 0;
let dobre = 0;
let zle = 0;

function startTest(nr){
aktualnyTest=nr;
aktualne=0;
dobre=0;
zle=0;

document.getElementById("menu").style.display="none";
document.getElementById("quiz").style.display="block";

pokazPytanie();
}

function pokazPytanie(){
let p=testy[aktualnyTest][aktualne];

document.getElementById("tytul").innerText="Test "+(aktualnyTest==0?"0B":"6B");
document.getElementById("licznik").innerText="Pytanie "+(aktualne+1)+" / "+testy[aktualnyTest].length;
document.getElementById("pytanie").innerText=p.pytanie;

let html="";
p.odpowiedzi.forEach((o,i)=>{
html+=`<label id="o${i}"><input type="checkbox" value="${i}"> ${o}</label><br>`;
});

document.getElementById("odpowiedzi").innerHTML=html;
document.getElementById("info").innerText="";

document.getElementById("btnSprawdz").style.display="inline";
document.getElementById("btnDalej").style.display="none";
}

function sprawdz(){
let p=testy[aktualnyTest][aktualne];
let zazn=[...document.querySelectorAll("input:checked")].map(x=>parseInt(x.value));

let dobrze=JSON.stringify(zazn.sort())===JSON.stringify(p.poprawne.sort());

p.odpowiedzi.forEach((_,i)=>{
let el=document.getElementById("o"+i);
if(p.poprawne.includes(i)) el.classList.add("good");
if(zazn.includes(i)&&!p.poprawne.includes(i)) el.classList.add("bad");
});

if(dobrze){dobre++;info.innerText="✅ Dobrze";}
else{zle++;info.innerText="❌ Źle";}

btnSprawdz.style.display="none";
btnDalej.style.display="inline";
}

function dalej(){
aktualne++;

if(aktualne<testy[aktualnyTest].length){
pokazPytanie();
}else{
let suma=dobre+zle;
let procent=Math.round((dobre/suma)*100);

pytanie.innerText="Koniec testu";
odpowiedzi.innerHTML="";
info.innerHTML=`Dobre: ${dobre}<br>Złe: ${zle}<br>${procent}%`;

btnDalej.style.display="none";
btnRestart.style.display="inline";
btnMenu.style.display="inline";
}
}

function restartTest(){startTest(aktualnyTest);}
function powrotMenu(){quiz.style.display="none";menu.style.display="block";}

</script>
</body>
</html>
